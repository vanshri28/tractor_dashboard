<!DOCTYPE html>
<html>
<head>
    <title>Main Office Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background:
            linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
            url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7qQZyjG-ef27ploWXIZ4KNMhz100XO99sxA&s");

            background-size: cover;
            background-position: center;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            padding: 25px;

            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .logout {
            float: right;
            background: red;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: teal;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        img {
            width: 80px;
            border-radius: 5px;
        }

    </style>
</head>

<body>

<div class="container">

    <a href="/logout" class="logout">Logout</a>

    <h2>🏢 Main Office Dashboard</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Phone</th>
            <th>Name</th>
            <th>Address</th>
            <th>Tractor</th>
            <th>Trip</th>
            <th>Photo</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>{{row[5]}}</td>

            <td>
                {% if row[6] %}
                    <img src="{{row[6]}}">
                {% else %}
                    No Image
                {% endif %}
            </td>

        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
