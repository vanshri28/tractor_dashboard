<!DOCTYPE html>
<html>
<head>
<title>Office Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#141e30,#243b55);
color:white;
}

.container{
width:90%;
margin:30px auto;
}

h2{text-align:center;}

.table-box{
background:white;
padding:20px;
border-radius:10px;
color:black;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c3e50;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}

input{
padding:10px;
width:300px;
margin-bottom:15px;
}
</style>

</head>

<body>

<div class="container">

<h2>Office Dashboard</h2>
<a href="/logout">Logout</a>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search by Driver Phone" onkeyup="searchTable()">

<div class="table-box">
<table id="table">
<tr>
<th>ID</th>
<th>Farmer</th>
<th>Farmer Phone</th>
<th>Address</th>
<th>Tractor</th>
<th>Trip</th>
<th>Driver</th>
<th>Driver Phone</th>
<th>Entry</th>
<th>Token</th>
<th>Time</th>
<th>Print</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[2]}}</td>
<td>{{row[1]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[8]}}</td>
<td>{{row[9]}}</td>
<td>{{row[10]}}</td>

<td>
<button onclick="printSlip('{{row[2]}}','{{row[6]}}','{{row[7]}}','{{row[4]}}','{{row[5]}}','{{row[8]}}','{{row[9]}}')">
Print
</button>
</td>

</tr>
{% endfor %}

</table>
</div>

</div>

<script>
function searchTable(){
let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach((row,i)=>{
if(i==0) return;
let text=row.innerText.toLowerCase();
row.style.display=text.includes(input)?"":"none";
});
}

function printSlip(farmer, driver, phone, tractor, trip, entry, token){

let content = `
<h3>Panchganga Sugar Factory</h3>
<p>Farmer: ${farmer}</p>
<p>Driver: ${driver}</p>
<p>Phone: ${phone}</p>
<p>Tractor: ${tractor}</p>
<p>Trip: ${trip}</p>
<p>Entry: ${entry}</p>
<p>Token: ${token}</p>
`;

let win = window.open("", "", "width=300,height=600");
win.document.write(content);
win.print();
}
</script>

</body>
</html>
