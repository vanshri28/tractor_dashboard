<!DOCTYPE html>
<html>
<head>
<title>Office Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size:cover;
color:white;
}

.container{
width:85%;
margin:30px auto;
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
}

h2{text-align:center;}

table{
width:100%;
margin-top:20px;
background:white;
color:black;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

button{
padding:5px 10px;
background:#27ae60;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}
</style>

<script>
function printSlip(data){
    let slip = `
    <html>
    <head>
    <style>
    body{font-family:monospace; padding:20px;}
    h3{text-align:center;}
    </style>
    </head>
    <body>

    <h3>Shree Sugar Factory</h3>
    <p>-----------------------------------</p>
    <p>Name: ${data.name}</p>
    <p>Phone: ${data.phone}</p>
    <p>Address: ${data.address}</p>
    <p>Tractor: ${data.tractor}</p>
    <p>Trip: ${data.trip}</p>
    <p>Driver: ${data.driver}</p>
    <p>Driver Phone: ${data.driver_phone}</p>
    <p>Entry No: ${data.entry}</p>
    <p>Token No: ${data.token}</p>
    <p>Time: ${data.time}</p>
    <p>-----------------------------------</p>

    </body>
    </html>
    `;

    let win = window.open('', '', 'width=300,height=400');
    win.document.write(slip);
    win.document.close();
    win.print();
}
</script>

</head>

<body>

<div class="container">

<div style="text-align:right;">
    <a href="/logout">
        <button style="background:red;">Logout</button>
    </a>
</div>

<h2>Office Dashboard</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Tractor</th>
<th>Trip</th>
<th>Driver</th>
<th>Driver Phone</th>
<th>Entry</th>
<th>Token</th>
<th>Time</th>
<th>Print</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[2]}}</td>
<td>{{row[1]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[8]}}</td>
<td>{{row[9]}}</td>
<td>{{row[10]}}</td>

<td>
<button onclick='printSlip({
name:"{{row[2]}}",
phone:"{{row[1]}}",
address:"{{row[3]}}",
tractor:"{{row[4]}}",
trip:"{{row[5]}}",
driver:"{{row[6]}}",
driver_phone:"{{row[7]}}",
entry:"{{row[8]}}",
token:"{{row[9]}}",
time:"{{row[10]}}"
})'>Print</button>
</td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
