<!DOCTYPE html>
<html>
<head>
<title>Office Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#141e30,#243b55);
color:white;
}

.container{
width:90%;
margin:30px auto;
}

h2{text-align:center;}

.table-box{
background:white;
padding:20px;
border-radius:10px;
color:black;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c3e50;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}
</style>

</head>

<body>

<div class="container">

<h2>Office Dashboard</h2>
<a href="/logout">Logout</a>

<div class="table-box">
<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Tractor</th>
<th>Trip</th>
<th>Entry</th>
<th>Token</th>
<th>Time</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[2]}}</td>
<td>{{row[1]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[8]}}</td>
</tr>
{% endfor %}

</table>
</div>

</div>

</body>
</html>
