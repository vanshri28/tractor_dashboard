<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{ text-align:center; font-family:Arial; background:#2c5364; color:white;}
input{ padding:10px; margin:5px;}
button{ padding:10px; background:green; color:white;}
table{ margin:auto; background:white; color:black;}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<form method="POST">
<input name="name" placeholder="Name">
<input name="phone" placeholder="Phone">
<input name="address" placeholder="Address">
<input name="tractor" placeholder="Tractor">
<input name="trip" placeholder="Trip">
<button>Submit</button>
</form>

<table border="1">
<tr>
<th>ID</th><th>Name</th><th>Phone</th><th>Tractor</th><th>Trip</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.id}}</td>
<td>{{row.name}}</td>
<td>{{row.phone}}</td>
<td>{{row.tractor}}</td>
<td>{{row.trip}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
