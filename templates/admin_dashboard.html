<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script>
function fetchFarmer(){
let phone=document.getElementById("phone").value;
fetch("/get_farmer/"+phone)
.then(res=>res.json())
.then(data=>{
document.getElementById("name").value=data.name;
document.getElementById("address").value=data.address;
});
}
</script>

</head>

<body>

<h2>Admin Dashboard</h2>
<a href="/logout">Logout</a>

<form method="POST">
<input id="phone" name="phone" placeholder="Phone">
<button type="button" onclick="fetchFarmer()">Fetch</button><br>

<input id="name" name="name" placeholder="Name">
<input id="address" name="address" placeholder="Address"><br>

<input name="tractor" placeholder="Tractor">
<input name="trip" placeholder="Trip"><br>

<button type="submit">Submit</button>
</form>

</body>
</html>
