<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background:
            linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
            url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7qQZyjG-ef27ploWXIZ4KNMhz100XO99sxA&s");

            background-size: cover;
            background-position: center;
        }

        .container {
            width: 85%;
            margin: 30px auto;
            padding: 20px;

            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        h2 {
            text-align: center;
            color: white;
        }

        .logout {
            float: right;
            background: red;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        .form-box {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .fetch-btn {
            background: blue;
        }

        table {
            width: 100%;
            margin-top: 20px;
            background: white;
            border-collapse: collapse;
        }

        th {
            background: teal;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        img {
            width: 100px;
            border-radius: 5px;
        }

    </style>

    <script>
        function fetchFarmer() {
            let phone = document.getElementById("phone").value;

            fetch("/get_farmer/" + phone)
            .then(res => res.json())
            .then(data => {
                if(data.error){
                    alert("Farmer not found");
                } else {
                    document.getElementById("name").value = data.name;
                    document.getElementById("address").value = data.address;
                }
            });
        }
    </script>

</head>

<body>

<div class="container">

    <a href="/logout" class="logout">Logout</a>

    <h2>🚜 Sugar Factory Dashboard</h2>

    <div class="form-box">

        <form method="POST">

            <input id="phone" name="phone" placeholder="Farmer Phone">
            <button type="button" onclick="fetchFarmer()" class="fetch-btn">Fetch</button><br>

            <input id="name" name="name" placeholder="Farmer Name">
            <input id="address" name="address" placeholder="Address"><br>

            <input name="tractor" placeholder="Tractor Number">
            <input name="trip" placeholder="Trip Number"><br>

            <button type="submit">Submit Entry</button>

        </form>

    </div>

    <h3 style="text-align:center; color:white;">All Tractor Entries</h3>

    <table>
        <tr>
            <th>ID</th>
            <th>Phone</th>
            <th>Name</th>
            <th>Address</th>
            <th>Tractor</th>
            <th>Trip</th>
            <th>Photo</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>{{row[5]}}</td>

            <td>
                {% if row[6] %}
                    <img src="{{row[6]}}">
                {% else %}
                    No Image
                {% endif %}
            </td>

        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
