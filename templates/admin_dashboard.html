<h2>Admin Dashboard</h2>

<form method="POST">
<input name="phone" placeholder="Phone">
<button>Fetch</button>
</form>

{% if data %}
<form method="POST">
<input type="hidden" name="phone" value="{{data[2]}}">
<input value="{{data[1]}}" readonly>
<input value="{{data[3]}}" readonly>

<input name="tractor" placeholder="Tractor">
<input name="trip" placeholder="Trip">
<input name="driver" placeholder="Driver">
<input name="driver_phone" placeholder="Driver Phone">

<button name="submit">Submit</button>
</form>
{% endif %}
