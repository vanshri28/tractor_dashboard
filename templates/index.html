<!DOCTYPE html>
<html>
<head>
<title>Smart Tractor System</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#00000088,#00000088),
url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
gap:20px;
}

.box{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:10px;
color:white;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<div class="box">
<h3>Admin</h3>
<form action="/admin_login" method="POST">
<input name="username"><br>
<input type="password" name="password"><br>
<button>Login</button>
</form>
</div>

<div class="box">
<h3>Farmer</h3>
<form action="/farmer_login" method="POST">
<input name="phone"><br>
<button>Login</button>
</form>
<a href="/register">Register</a>
</div>

<div class="box">
<h3>Office</h3>
<form action="/office_login" method="POST">
<input name="username"><br>
<input type="password" name="password"><br>
<button>Login</button>
</form>
</div>

</div>

</body>
</html>
