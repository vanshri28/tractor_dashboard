<!DOCTYPE html>
<html>
<head>
<title>Smart Tractor System</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
gap:30px;
}

.box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
color:white;
width:250px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:95%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
}

a{color:white;}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Admin</h3>
<form action="/admin_login" method="POST">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>
</div>

<div class="box">
<h3>Farmer</h3>
<form action="/farmer_login" method="POST">
<input name="phone" placeholder="Phone">
<button>Login</button>
</form>
<a href="/register">Register</a>
</div>

<div class="box">
<h3>Office</h3>
<form action="/office_login" method="POST">
<input name="username">
<input type="password" name="password">
<button>Login</button>
</form>
</div>

</div>

</body>
</html>
