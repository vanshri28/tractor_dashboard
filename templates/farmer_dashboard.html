<!DOCTYPE html>
<html>
<head>
<title>Farmer</title>
<style>
body{ text-align:center; font-family:Arial;}
table{ margin:auto; border-collapse:collapse;}
th,td{ padding:10px; border:1px solid black;}
</style>
</head>

<body>

<h1>Farmer Dashboard</h1>

<table>
<tr>
<th>Name</th><th>Tractor</th><th>Trip</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.name}}</td>
<td>{{row.tractor}}</td>
<td>{{row.trip}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
