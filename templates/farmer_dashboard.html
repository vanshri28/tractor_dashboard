<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>
</head>

<body>

<h2>Your Trips</h2>
<a href="/logout">Logout</a>

<table border="1">
<tr>
<th>Tractor</th>
<th>Trip</th>
<th>Entry</th>
<th>Token</th>
<th>Time</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[8]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
