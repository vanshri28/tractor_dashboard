<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;

background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7qQZyjG-ef27ploWXIZ4KNMhz100XO99sxA&s");

background-size:cover;
}

.container{
width:80%;
margin:40px auto;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
}

input{padding:10px;margin:5px;}
button{padding:10px;background:green;color:white;border:none;}

table{width:100%;margin-top:20px;background:white;}
th{background:teal;color:white;}
td,th{text-align:center;padding:10px;}
</style>

<script>
function fetchFarmer(){
let phone=document.getElementById("phone").value;

fetch("/get_farmer/"+phone)
.then(res=>res.json())
.then(data=>{
if(data.error){
alert("Farmer not found");
}else{
document.getElementById("name").value=data.name;
document.getElementById("address").value=data.address;
}
});
}
</script>

</head>

<body>

<div class="container">

<a href="/logout">Logout</a>

<h2>Sugar Factory Dashboard</h2>

<form method="POST">

<input id="phone" name="phone" placeholder="Phone">
<button type="button" onclick="fetchFarmer()">Fetch</button><br>

<input id="name" name="name" placeholder="Name">
<input id="address" name="address" placeholder="Address"><br>

<input name="tractor" placeholder="Tractor">
<input name="trip" placeholder="Trip"><br>

<button type="submit">Submit Entry</button>

</form>

<table>
<tr>
<th>ID</th>
<th>Phone</th>
<th>Name</th>
<th>Address</th>
<th>Tractor</th>
<th>Trip</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
