<!DOCTYPE html>
<html>
<head>
    <title>Farmer Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background:
            linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
            url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7qQZyjG-ef27ploWXIZ4KNMhz100XO99sxA&s");

            background-size: cover;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            color: white;
            width: 350px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>👨‍🌾 Farmer Registration</h2>

    <form method="POST">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="text" name="address" placeholder="Address" required>

        <button type="submit">Register</button>

    </form>

    <p>Already registered? <a href="/">Login here</a></p>

</div>

</body>
</html>
